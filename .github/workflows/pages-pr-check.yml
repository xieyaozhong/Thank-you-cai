name: Pages public verification

on:
  pull_request:
    branches: ["main"]

permissions:
  contents: read
  actions: read

concurrency:
  group: pages-public-check
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Wait for main publisher
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          headers=(-H "Accept: application/vnd.github+json" -H "Authorization: Bearer $GH_TOKEN" -H "X-GitHub-Api-Version: 2022-11-28")
          success=false
          for attempt in $(seq 1 48); do
            curl -fsSL "${headers[@]}" \
              "$GITHUB_API_URL/repos/$GITHUB_REPOSITORY/actions/runs?head_sha=7576900be7fb7627720571efc3a0c6a14f97158f&per_page=5" \
              > /tmp/runs.json
            result="$(python - <<'PY'
          import json
          runs = json.load(open('/tmp/runs.json', encoding='utf-8')).get('workflow_runs', [])
          if not runs:
              print('missing')
          else:
              run = runs[0]
              print(f"{run.get('id')}|{run.get('status')}|{run.get('conclusion')}")
          PY
          )"
            echo "PUBLISH_RUN $result"
            case "$result" in
              *'|completed|success') success=true; break ;;
              *'|completed|'*) exit 1 ;;
            esac
            sleep 5
          done
          test "$success" = true

      - name: Verify deployed files and version
        run: |
          set -euo pipefail
          base="https://xieyaozhong.github.io/Thank-you-cai"
          index_html="$(curl -fsSL "$base/")"
          owner_html="$(curl -fsSL "$base/owner.html")"
          status_json="$(curl -fsSL "$base/deployment-status.json")"
          grep -Fq "謝謝你，菜！" <<<"$index_html"
          grep -Fq "owner.html" <<<"$index_html"
          grep -Fq "catalog.js" <<<"$index_html"
          grep -Fq "攤主頁面" <<<"$owner_html"
          grep -Fq "7576900be7fb7627720571efc3a0c6a14f97158f" <<<"$status_json"
          for path in / /owner.html /app.js /catalog.js /owner.js /owner.css /styles.css /manifest.webmanifest /deployment-status.json; do
            code="$(curl -sS -o /dev/null -w '%{http_code}' "$base$path")"
            echo "PUBLIC $path $code"
            test "$code" = 200
          done
          echo "PUBLIC_DEPLOYMENT_VERIFIED"
