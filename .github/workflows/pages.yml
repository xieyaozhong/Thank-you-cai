name: Publish GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages-publish
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare and validate static site
        env:
          DEPLOYED_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          mkdir -p _site
          cat .deploy/site.zip.b64.part* | base64 --decode > /tmp/site.zip
          unzip -q /tmp/site.zip -d _site
          test -f _site/index.html
          test -f _site/owner.html
          node --check _site/app.js
          node --check _site/catalog.js
          node --check _site/owner.js
          python - <<'PY'
          import json
          import os
          from datetime import datetime, timezone

          payload = {
              "status": "success",
              "commit": os.environ["DEPLOYED_SHA"],
              "deployed_at": datetime.now(timezone.utc).isoformat(),
              "frontend_url": "https://xieyaozhong.github.io/Thank-you-cai/",
              "owner_url": "https://xieyaozhong.github.io/Thank-you-cai/owner.html",
              "product_count": 28,
          }
          with open("_site/deployment-status.json", "w", encoding="utf-8") as file:
              json.dump(payload, file, ensure_ascii=False, indent=2)
              file.write("\n")
          PY

      - name: Publish to configured gh-pages branch
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          cd _site
          git init
          git checkout -b gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Deploy ${GITHUB_SHA}"
          git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push --force origin gh-pages

      - name: Verify public frontend and owner page
        run: |
          set -euo pipefail
          base="https://xieyaozhong.github.io/Thank-you-cai"
          verified=false
          for attempt in $(seq 1 30); do
            index_html="$(curl -fsSL --retry 1 --retry-delay 1 "$base/" || true)"
            owner_html="$(curl -fsSL --retry 1 --retry-delay 1 "$base/owner.html" || true)"
            status_json="$(curl -fsSL --retry 1 --retry-delay 1 "$base/deployment-status.json" || true)"
            if grep -Fq "謝謝你，菜！" <<<"$index_html" \
              && grep -Fq "攤主頁面" <<<"$owner_html" \
              && grep -Fq "$GITHUB_SHA" <<<"$status_json"; then
              verified=true
              break
            fi
            sleep 5
          done
          test "$verified" = true
          echo "Verified: $base/"
          echo "Verified: $base/owner.html"
