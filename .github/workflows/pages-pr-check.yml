name: Pages public verification

on:
  pull_request:
    branches: ["main"]

permissions:
  contents: read
  actions: read
  pages: read
  deployments: read

concurrency:
  group: pages-public-check
  cancel-in-progress: true

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Inspect Pages configuration and runs
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          headers=(-H "Accept: application/vnd.github+json" -H "Authorization: Bearer $GH_TOKEN" -H "X-GitHub-Api-Version: 2022-11-28")
          curl -fsSL "${headers[@]}" "$GITHUB_API_URL/repos/$GITHUB_REPOSITORY/pages" > /tmp/pages.json
          curl -fsSL "${headers[@]}" "$GITHUB_API_URL/repos/$GITHUB_REPOSITORY/actions/runs?per_page=12" > /tmp/runs.json
          curl -fsSL "${headers[@]}" "$GITHUB_API_URL/repos/$GITHUB_REPOSITORY/deployments?environment=github-pages&per_page=10" > /tmp/deployments.json
          python - <<'PY'
          import json
          pages = json.load(open('/tmp/pages.json', encoding='utf-8'))
          runs = json.load(open('/tmp/runs.json', encoding='utf-8')).get('workflow_runs', [])
          deployments = json.load(open('/tmp/deployments.json', encoding='utf-8'))
          print('PAGES', {k: pages.get(k) for k in ('html_url','status','build_type','source','cname')})
          for run in runs:
              print('RUN', run.get('id'), run.get('name'), run.get('event'), run.get('head_sha'), run.get('status'), run.get('conclusion'))
          for deployment in deployments:
              print('DEPLOYMENT', deployment.get('id'), deployment.get('sha'), deployment.get('ref'), deployment.get('environment'), deployment.get('created_at'))
          PY

      - name: Inspect public files
        run: |
          set -u
          base="https://xieyaozhong.github.io/Thank-you-cai"
          for path in / /owner.html /app.js /catalog.js /owner.js /owner.css /styles.css /manifest.webmanifest; do
            code="$(curl -sS -o "/tmp/$(echo "$path" | tr '/.' '__')" -w '%{http_code}' "$base$path")"
            echo "PUBLIC $path $code"
          done
          curl -sS "$base/" > /tmp/index.html
          echo "INDEX_OWNER_LINKS $(grep -o 'owner.html' /tmp/index.html | wc -l)"
          echo "INDEX_CATALOG_LINKS $(grep -o 'catalog.js' /tmp/index.html | wc -l)"
          echo "INDEX_APP_LINKS $(grep -o 'app.js' /tmp/index.html | wc -l)"
          echo "INDEX_PREVIEW"
          head -c 360 /tmp/index.html || true
          echo
