name: Pages public verification

on:
  pull_request:
    branches: ["main"]

permissions:
  contents: read
  actions: read

concurrency:
  group: pages-public-check
  cancel-in-progress: true

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Inspect main deployment
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          curl -fsSL \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "$GITHUB_API_URL/repos/$GITHUB_REPOSITORY/actions/runs?head_sha=e46deb177c0fb02f74b767239d15c799312a49a4&per_page=10" \
            > /tmp/main-runs.json
          python - <<'PY'
          import json
          data = json.load(open('/tmp/main-runs.json', encoding='utf-8'))
          runs = data.get('workflow_runs', [])
          print('MAIN_RUN_COUNT', len(runs))
          for run in runs:
              print('MAIN_RUN', run.get('id'), run.get('name'), run.get('event'), run.get('status'), run.get('conclusion'))
              print('MAIN_RUN_URL', run.get('html_url'))
          if not runs:
              raise SystemExit('No workflow run found for main deployment commit')
          PY

      - name: Inspect public URLs
        run: |
          set -u
          base="https://xieyaozhong.github.io/Thank-you-cai"
          echo "FRONTEND_STATUS $(curl -sS -o /tmp/index.html -w '%{http_code}' "$base/")"
          echo "OWNER_STATUS $(curl -sS -o /tmp/owner.html -w '%{http_code}' "$base/owner.html")"
          echo "FRONTEND_HAS_TITLE $(grep -Fqc '謝謝你，菜！' /tmp/index.html || true)"
          echo "OWNER_HAS_TITLE $(grep -Fqc '攤主頁面' /tmp/owner.html || true)"
          echo "FRONTEND_PREVIEW"
          head -c 220 /tmp/index.html || true
          echo
          echo "OWNER_PREVIEW"
          head -c 220 /tmp/owner.html || true
          echo
