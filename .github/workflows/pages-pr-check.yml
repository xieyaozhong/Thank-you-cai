name: Pages public verification

on:
  pull_request:
    branches: ["main"]

permissions:
  contents: read

concurrency:
  group: pages-public-check
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate deployment bundle
        run: |
          set -euo pipefail
          mkdir -p _site
          cat .deploy/site.zip.b64.part* | base64 --decode > /tmp/site.zip
          unzip -q /tmp/site.zip -d _site
          test -f _site/index.html
          test -f _site/owner.html
          node --check _site/app.js
          node --check _site/catalog.js
          node --check _site/owner.js

      - name: Verify public pages
        run: |
          set -euo pipefail
          base="https://xieyaozhong.github.io/Thank-you-cai"
          verified=false
          for attempt in $(seq 1 24); do
            index_html="$(curl -fsSL --retry 2 --retry-delay 2 "$base/" || true)"
            owner_html="$(curl -fsSL --retry 2 --retry-delay 2 "$base/owner.html" || true)"
            if grep -Fq "謝謝你，菜！" <<<"$index_html" && grep -Fq "攤主頁面" <<<"$owner_html"; then
              verified=true
              break
            fi
            sleep 5
          done
          test "$verified" = true
          printf 'Verified frontend: %s/\nVerified owner: %s/owner.html\n' "$base" "$base"
