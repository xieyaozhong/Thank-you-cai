name: Publish GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages-publish
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare and validate static site
        env:
          DEPLOYED_SHA: ${{ github.sha }}
          SUPABASE_URL: ${{ vars.SUPABASE_URL }}
          SUPABASE_PUBLISHABLE_KEY: ${{ vars.SUPABASE_PUBLISHABLE_KEY }}
        run: |
          set -euo pipefail
          mkdir -p _site
          cat .deploy/site.zip.b64.part* | base64 --decode > /tmp/site.zip
          unzip -q /tmp/site.zip -d _site
          cat .deploy/cloud-overlay.zip.b64.part* | base64 --decode > /tmp/cloud-overlay.zip
          unzip -qo /tmp/cloud-overlay.zip -d _site
          rm -f _site/catalog-extra.js
          python - <<'PY'
          from pathlib import Path
          owner_path = Path('_site/owner.html')
          owner_html = owner_path.read_text(encoding='utf-8')
          owner_html = owner_html.replace('    <script src="./catalog-extra.js" defer></script>\n', '')
          owner_path.write_text(owner_html, encoding='utf-8')
          PY
          test -f _site/index.html
          test -f _site/customer.html
          test -f _site/owner.html
          test -f _site/cloud-config.js
          test -f _site/cloud-client.js
          test -f _site/SUPABASE_SETUP.sql
          node --check _site/app.js
          node --check _site/catalog.js
          node --check _site/cloud-client.js
          node --check _site/owner.js
          node - <<'NODE'
          const fs = require('fs');
          global.window = {};
          eval(fs.readFileSync('_site/catalog.js', 'utf8'));
          const catalog = window.THANK_YOU_CAI_CATALOG;
          if (!catalog || catalog.products.length !== 40) throw new Error('Expected 40 products');
          if (new Set(catalog.products.map((item) => item.id)).size !== 40) throw new Error('Duplicate product IDs');
          NODE
          python - <<'PY'
          import json
          import os
          from datetime import datetime, timezone
          from pathlib import Path

          config_path = Path('_site/cloud-config.js')
          config = config_path.read_text(encoding='utf-8')
          url = os.environ.get('SUPABASE_URL', '').strip()
          key = os.environ.get('SUPABASE_PUBLISHABLE_KEY', '').strip()
          config = config.replace('__SUPABASE_URL__', url).replace('__SUPABASE_PUBLISHABLE_KEY__', key)
          config_path.write_text(config, encoding='utf-8')
          cloud_configured = bool(url.startswith('https://') and len(key) > 20)
          payload = {
              'status': 'success',
              'commit': os.environ['DEPLOYED_SHA'],
              'deployed_at': datetime.now(timezone.utc).isoformat(),
              'frontend_url': 'https://xieyaozhong.github.io/Thank-you-cai/customer.html',
              'owner_url': 'https://xieyaozhong.github.io/Thank-you-cai/owner.html',
              'product_count': 40,
              'cloud_configured': cloud_configured,
              'architecture': 'separate-customer-owner',
          }
          Path('_site/deployment-status.json').write_text(json.dumps(payload, ensure_ascii=False, indent=2) + '\n', encoding='utf-8')
          PY

      - name: Publish to configured gh-pages branch
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          cd _site
          git init
          git checkout -b gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Deploy ${GITHUB_SHA}"
          git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push --force origin gh-pages

      - name: Verify public portals
        run: |
          set -euo pipefail
          base="https://xieyaozhong.github.io/Thank-you-cai"
          verified=false
          for attempt in $(seq 1 36); do
            portal="$(curl -fsSL --retry 1 --retry-delay 1 "$base/" || true)"
            customer="$(curl -fsSL --retry 1 --retry-delay 1 "$base/customer.html" || true)"
            owner="$(curl -fsSL --retry 1 --retry-delay 1 "$base/owner.html" || true)"
            status_json="$(curl -fsSL --retry 1 --retry-delay 1 "$base/deployment-status.json" || true)"
            if grep -Fq "顧客端" <<<"$portal" \
              && grep -Fq "CUSTOMER CHECKOUT" <<<"$customer" \
              && grep -Fq "攤主登入" <<<"$owner" \
              && grep -Fq "$GITHUB_SHA" <<<"$status_json"; then
              verified=true
              break
            fi
            sleep 5
          done
          test "$verified" = true
          echo "Verified portal: $base/"
          echo "Verified customer: $base/customer.html"
          echo "Verified owner: $base/owner.html"
