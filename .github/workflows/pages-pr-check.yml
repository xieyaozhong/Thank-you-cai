name: Pages public verification

on:
  pull_request:
    branches: ["main"]

permissions:
  contents: read
  actions: read

concurrency:
  group: pages-public-check
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate deployment bundle
        run: |
          set -euo pipefail
          mkdir -p _site
          cat .deploy/site.zip.b64.part* | base64 --decode > /tmp/site.zip
          unzip -q /tmp/site.zip -d _site
          test -f _site/index.html
          test -f _site/owner.html
          node --check _site/app.js
          node --check _site/catalog.js
          node --check _site/owner.js

      - name: Inspect main deployment runs
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          curl -fsSL \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "$GITHUB_API_URL/repos/$GITHUB_REPOSITORY/actions/runs?head_sha=e46deb177c0fb02f74b767239d15c799312a49a4&per_page=10" \
            > /tmp/main-runs.json
          python - <<'PY'
          import json
          data = json.load(open('/tmp/main-runs.json', encoding='utf-8'))
          print('total_count=', data.get('total_count'))
          for run in data.get('workflow_runs', []):
              print('RUN', run.get('id'), run.get('name'), run.get('event'), run.get('status'), run.get('conclusion'), run.get('html_url'))
          if not data.get('workflow_runs'):
              raise SystemExit('No workflow run found for the main deployment commit')
          PY

      - name: Verify public pages
        run: |
          set -euo pipefail
          base="https://xieyaozhong.github.io/Thank-you-cai"
          verified=false
          for attempt in $(seq 1 8); do
            index_html="$(curl -fsSL --retry 1 --retry-delay 1 "$base/" || true)"
            owner_html="$(curl -fsSL --retry 1 --retry-delay 1 "$base/owner.html" || true)"
            if grep -Fq "謝謝你，菜！" <<<"$index_html" && grep -Fq "攤主頁面" <<<"$owner_html"; then
              verified=true
              break
            fi
            sleep 5
          done
          if [ "$verified" != true ]; then
            echo "Frontend response preview:"
            curl -sSL "$base/" | head -c 500 || true
            echo
            echo "Owner HTTP response:"
            curl -sSIL "$base/owner.html" || true
            exit 1
          fi
          printf 'Verified frontend: %s/\nVerified owner: %s/owner.html\n' "$base" "$base"
